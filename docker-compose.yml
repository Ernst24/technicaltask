version: '1.0'

services:
  db:
    image: postgres:15-alpine
    container_name: auth_project_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: auth_project_app
    restart: always
    env_file:
      - .env
    command: sh -c "sleep 2 && alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:{DB_PORT_INTERNAL}/${DB_NAME}
    depends_on:
      - db

volumes:
  postgres_data: